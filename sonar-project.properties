# Ajusta projectKey y organization a los valores que te dé SonarCloud
# al crear el proyecto (normalmente <org>_<repo> y tu slug de org).
sonar.projectKey=nichokas_bilattice
sonar.organization=nichokas

sonar.projectName=bilattice
sonar.sources=src
sonar.tests=tests

# Cobertura generada por cargo-llvm-cov en el workflow
sonar.rust.lcov.reportPaths=lcov.info
