name: SonarQube Cloud

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Historia completa: Sonar la necesita para asignar autoría
          # y detectar "new code" correctamente.
          fetch-depth: 0

      # El scanner de Sonar ejecuta `cargo clippy` por su cuenta,
      # así que cargo y clippy tienen que estar en el PATH.
      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup component add clippy llvm-tools-preview

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: sonarcloud
          cache-on-failure: true

      - name: Cache cargo-llvm-cov binary
        id: cache-cargo-llvm-cov
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-llvm-cov
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-llvm-cov-v1

      - name: Install cargo-llvm-cov
        if: steps.cache-cargo-llvm-cov.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonarqube-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-sonarqube-cache-

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
